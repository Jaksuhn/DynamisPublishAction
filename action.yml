name: 'Build & Publish to Dynamis'
description: 'Builds plugin against the latest Dalamud branch, or release if available, then publishes to Dynamis'

on:
  workflow_call:
    inputs:
      version_format:
        description: "Format of the plugin's version number. Default `v*.*`"
        default: 'v*.*'
      plugin_id:
        description: 'Plugin id on Dynamis'
        required: true
      internal_name:
        description: 'Internal name of the plugin. Defaults to the repository name'
        default: ${{ github.event.repository.name }}
      path:
        description: 'Path to the generated zip file. Defaults to `repository_name/bin/Release/repository_name.zip`'
        default: ${{ github.event.repository.name }}/bin/Release/${{ github.event.repository.name }}/latest.zip
      dalamud_version:
        required: true
      publisher_key:
        default: $${{ secrets.PUBLISHER_KEY }}

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      DALAMUD_HOME: /tmp/dalamud
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get Tag Name
        run: echo "tag=$(echo ${{ github.ref }} | sed 's/refs\/tags\/v//')" >> $GITHUB_ENV

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x

      - name: Download config.yaml
        run: curl -L https://raw.githubusercontent.com/goatcorp/dalamud-declarative/main/config.yaml -o config.yaml

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.34.1/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Extract Latest Track Name
        id: latest_track
        run: |
          latest_entry=$(yq eval '.tracks | to_entries | sort_by(.value.applicableGameVersion, (.key == "release")) | .[-1]' config.yaml)
          track_name=$(echo "$latest_entry" | yq eval '.key' -)
          echo "result=$track_name" >> $GITHUB_OUTPUT

      - name: Download Dalamud Latest
        run: |
          if [ "${{ steps.latest_track.outputs.result }}" == "release" ]; then
              wget https://goatcorp.github.io/dalamud-distrib/latest.zip -O ${{ env.DALAMUD_HOME }}.zip
          else
              wget https://goatcorp.github.io/dalamud-distrib/${{ steps.latest_track.outputs.result }}/latest.zip -O ${{ env.DALAMUD_HOME }}.zip
          fi
          unzip ${{ env.DALAMUD_HOME }}.zip -d ${{ env.DALAMUD_HOME }}

      - name: Restore Project
        run: dotnet restore

      - name: Build Project
        run: dotnet build --configuration Release Automaton/Automaton.csproj -p:AssemblyVersion=${{ env.tag }}

      - name: Publish Version
        uses: PunishXIV/dynamis-action@v1
        id: dynamis
        with:
          plugin_id: ${{ inputs.plugin_id }}
          internal_name: ${{ inputs.internal_name }}
          version_number: ${{ env.tag }}
          path: ${{ inputs.path }}
          type: 'latest'
          dalamud_version: '13'
        env:
          PUBLISHER_KEY: ${{ inputs.publisher_key }}
